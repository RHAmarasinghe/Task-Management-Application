<div class="list-controls">
  <div class="control-group">
    <label>Filter</label>
    <select [(ngModel)]="filterStatus" (change)="onFilterChange()">
      <option value="all">All Tasks</option>
      <option value="active">Active</option>
      <option value="completed">Completed</option>
    </select>
  </div>
  <div class="control-group">
    <label>Sort By</label>
    <select [(ngModel)]="sortBy" (change)="onSortChange()">
      <option value="created">Recently Created</option>
      <option value="priority">Priority</option>
      <option value="dueDate">Due Date</option>
    </select>
  </div>
</div>

<div class="task-list">
  <div *ngIf="filteredTasks.length === 0" class="empty-msg">
    No tasks found matching criteria.
  </div>

  <div 
    class="task-item" 
    *ngFor="let task of filteredTasks"
    [class.active]="selectedTaskId === task.id"
    [class.completed]="task.isCompleted"
    (click)="selectTask.emit(task)">
    
    <div class="task-checkbox" (click)="$event.stopPropagation(); toggleStatus.emit(task)">
      <div class="custom-checkbox" [class.checked]="task.isCompleted">
        <svg *ngIf="task.isCompleted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
    </div>
    
    <div class="task-content">
      <h4>{{ task.title }}</h4>
      <div class="task-meta">
        <span class="priority" [attr.data-prio]="task.priority">
          {{ task.priority === 3 ? 'High' : task.priority === 2 ? 'Medium' : 'Low' }}
        </span>
        <span *ngIf="task.dueDate" class="date">
          Due: {{ task.dueDate | date:'MMM d, y' }}
        </span>
      </div>
    </div>
    
    <div class="task-actions">
      <button class="delete-btn" (click)="$event.stopPropagation(); deleteTask.emit(task.id)">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      </button>
    </div>
  </div>
</div>
